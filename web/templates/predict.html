{% extends "base.html" %}

{% block title %}预测 · 绿茵神算{% endblock %}

{% block content %}
<div class="card predict-form-card">
  <h2>⚽ 比赛预测</h2>
  <div class="predict-form">
    <div class="predict-form__teams">
      <div class="predict-form__team">
        <label for="team_a">主队</label>
        <select id="team_a" class="team-select">
          <option value="">选择球队...</option>
          {% for t in load_teams() %}
          <option value="{{ t.name }}">{{ flag_emoji(t.country_code) }} {{ t.name }}（{{ t.group }}组）</option>
          {% endfor %}
        </select>
      </div>
      <div class="predict-form__vs">
        <span class="vs-text">V S</span>
      </div>
      <div class="predict-form__team">
        <label for="team_b">客队</label>
        <select id="team_b" class="team-select">
          <option value="">选择球队...</option>
          {% for t in load_teams() %}
          <option value="{{ t.name }}">{{ flag_emoji(t.country_code) }} {{ t.name }}（{{ t.group }}组）</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="predict-form__actions">
      <div class="form-group" style="margin-bottom:0;">
        <label for="match_date">比赛日期</label>
        <input type="date" id="match_date" value="2026-06-11" class="date-input">
      </div>
      <button class="btn btn-primary btn-lg" id="btnPredict" onclick="doPredict()">
        ⚡ 开始预测
      </button>
    </div>
  </div>
</div>

<div id="resultContainer" style="display:none;">
  <div class="card result-card result-card--large" id="resultCard"></div>
</div>

<div id="historyContainer">
  <div class="card">
    <h2>历史预测</h2>
    <div id="historyList"><p class="empty-state">暂无预测记录</p></div>
  </div>
</div>

<script>
// 球队名称 → 国家代码映射表（从 /api/teams 加载）
let teamMap = {};

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const res = await fetch('/api/teams');
    const data = await res.json();
    data.forEach(t => { teamMap[t.name] = t; });
  } catch {}
  loadHistory();
});

function flagEmoji(code) {
  if (!code) return '';
  if (code === 'gb-eng' || code === 'gb-sct') {
    const ukBase = 0x1F1EC;
    return String.fromCodePoint(ukBase, ukBase + ('gb'.charCodeAt(1) - 97));
  }
  const base = 0x1F1E6;
  const a = code.charCodeAt(0) - 97;
  const b = code.charCodeAt(1) - 97;
  return String.fromCodePoint(base + a, base + b);
}

async function doPredict() {
  const teamA = document.getElementById('team_a').value;
  const teamB = document.getElementById('team_b').value;
  const date = document.getElementById('match_date').value;

  if (!teamA || !teamB) {
    showToast('请选择两支球队', 'error');
    return;
  }
  if (teamA === teamB) {
    showToast('请选择两支不同的球队', 'error');
    return;
  }

  const btn = document.getElementById('btnPredict');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 预测中...';

  try {
    const res = await fetch('/api/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ team_a: teamA, team_b: teamB, match_date: date })
    });
    const data = await res.json();
    renderResult(data);
    loadHistory();
  } catch (err) {
    showToast('预测失败: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ 开始预测';
  }
}

function renderResult(d) {
  const container = document.getElementById('resultContainer');
  container.style.display = 'block';

  const codeA = teamMap[d.teamA.name]?.country_code || '';
  const codeB = teamMap[d.teamB.name]?.country_code || '';

  const card = document.getElementById('resultCard');
  card.innerHTML = `
    <div class="result-header">
      <div class="result-team">
        <span class="result-team__flag">${flagEmoji(codeA)}</span>
        <span class="result-team__name">${d.teamA.name}</span>
      </div>
      <div class="result-vs">VS</div>
      <div class="result-team">
        <span class="result-team__flag">${flagEmoji(codeB)}</span>
        <span class="result-team__name">${d.teamB.name}</span>
      </div>
    </div>

    <div class="result-score">${d.predictedScore}</div>

    <div class="prob-bar prob-bar--lg">
      <div class="seg seg-a" style="width:${d.teamA.winProb}%">${d.teamA.winProb}%</div>
      <div class="seg seg-draw" style="width:${d.draw}%">${d.draw}%</div>
      <div class="seg seg-b" style="width:${d.teamB.winProb}%">${d.teamB.winProb}%</div>
    </div>

    <div class="prob-labels">
      <span>${d.teamA.name} 胜</span>
      <span>平</span>
      <span>${d.teamB.name} 胜</span>
    </div>

    <div class="result-meta">
      <span class="confidence-badge confidence-${d.confidence}">${d.confidence} 置信度</span>
    </div>

    <div class="key-factors">
      ${d.keyFactors.map(f => `<span class="tag">${f}</span>`).join('')}
    </div>

    <div class="analysis-text">${d.analysis}</div>

    <div class="result-players">
      <h3>关键球员</h3>
      <div class="player-grid">
        ${d.playersToWatch.map(p => `
          <div class="player-item">
            <span class="player-item__flag">${flagEmoji(teamMap[p.team]?.country_code)}</span>
            <div>
              <strong>${p.player}</strong>
              <span class="player-item__team">${p.team}</span>
              <span class="player-item__reason">${p.reason}</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function loadHistory() {
  const container = document.getElementById('historyList');
  try {
    const res = await fetch('/api/predict/history');
    const records = await res.json();
    if (!records.length) {
      container.innerHTML = '<p class="empty-state">暂无预测记录</p>';
      return;
    }
    container.innerHTML = '<div class="table-wrap"><table><thead><tr><th>时间</th><th>主队</th><th>客队</th><th>预测比分</th><th>置信度</th></tr></thead><tbody>' +
      records.slice(0, 20).map(r => `
        <tr>
          <td>${r.match_date || '-'}</td>
          <td>${r.team_a}</td>
          <td>${r.team_b}</td>
          <td>${r.result.predictedScore}</td>
          <td><span class="confidence-badge confidence-${r.result.confidence}">${r.result.confidence}</span></td>
        </tr>
      `).join('') +
      '</tbody></table></div>';
  } catch {
    container.innerHTML = '<p class="empty-state">加载失败</p>';
  }
}
</script>
{% endblock %}
